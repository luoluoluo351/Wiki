<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修仙 Wiki</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 顶部导航栏 -->
<nav id="top-nav">
  <span class="nav-brand">修仙 Wiki</span>
  <span class="nav-link" data-route="home">首页</span>
  <span class="nav-dropdown">
    <span class="nav-link nav-dropdown-trigger" data-route="characters">图鉴 ▾</span>
    <span class="nav-dropdown-menu">
      <span class="nav-link" data-route="characters">角色图鉴</span>
      <span class="nav-link" data-route="treasures">法宝图鉴</span>
      <span class="nav-link" data-route="pets">灵宠图鉴</span>
      <span class="nav-link" data-route="monsters">怪物图鉴</span>
      <span class="nav-link" data-route="items">道具图鉴</span>
    </span>
  </span>
  <span class="nav-link" data-route="skills">功法与神通</span>
  <span class="nav-link" data-route="story">剧情</span>
  <span class="nav-link" data-route="map">地图</span>
  <span class="nav-link" data-route="damage">伤害计算器</span>
  <span class="nav-link" data-route="leaderboard">排行榜</span>
  <span class="nav-dropdown">
    <span class="nav-link nav-dropdown-trigger" data-route="gacha-normal">召募 ▾</span>
    <span class="nav-dropdown-menu">
      <span class="nav-link" data-route="gacha-normal">寻仙唤灵</span>
      <span class="nav-link" data-route="gacha-up">仙途引渡</span>
      <span class="nav-link" data-route="gacha-skill">天书密阁</span>
    </span>
  </span>
  <span style="flex:1;"></span>
  <button class="nav-action-btn" id="btn-export" title="导出数据">📤</button>
  <button class="nav-action-btn" id="btn-import" title="导入数据">📥</button>
</nav>

<!-- 全局背景轮播 -->
<div id="global-bg"></div>
<!-- 内容区 -->
<div id="app"></div>

<!-- 技能查看弹窗（只读） -->
<div id="skill-modal" class="modal-overlay" style="display:none;" onclick="this.style.display='none'">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="toolbar">
      <span class="modal-title" id="modal-title">技能详情</span>
      <button class="btn-delete" onclick="document.getElementById('skill-modal').style.display='none'">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/image.js"></script>
<script src="js/placeholder.js"></script>
<script src="js/characters.js"></script>
<script src="js/treasures.js"></script>
<script src="js/pets.js"></script>
<script src="js/skills.js"></script>
<script src="js/map.js"></script>
<script src="js/damage.js"></script>
<script src="js/items.js"></script>
<script src="js/gacha.js"></script>
<script src="js/app.js"></script>
</body>
</html>
